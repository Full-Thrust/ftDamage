<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fleet Browser View</title>
  <style>
    body { font-family: Segoe UI, Arial, sans-serif; margin: 20px; background: #f4f6f8; color: #1f2937; }
    h1 { margin: 0 0 8px; }
    h2 { margin: 16px 0 8px; font-size: 20px; color: #111827; }
    .meta { margin: 0 0 16px; color: #374151; }
    .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin: 12px 0 16px; }
    .btn, .file-label {
      background: #111827;
      color: #fff;
      border: 0;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    .file-label input { display: none; }
    .hint { font-size: 13px; color: #4b5563; }
    details { background: #ffffff; border: 1px solid #d1d5db; border-radius: 8px; padding: 10px 12px; margin-bottom: 10px; }
    .fleet-block { margin: 0 0 16px; }
    summary { cursor: pointer; font-weight: 700; color: #111827; }
    .path { margin-top: 8px; font-size: 12px; color: #6b7280; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 8px 14px; margin-top: 10px; }
    .field { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 6px; padding: 8px; }
    .label { font-weight: 700; color: #111827; }
    .status-pill { display: inline-block; padding: 2px 8px; border-radius: 999px; font-weight: 700; font-size: 12px; }
    .status-operational { background: #dcfce7; color: #166534; border: 1px solid #86efac; }
    .status-damaged { background: #fef9c3; color: #854d0e; border: 1px solid #fde047; }
    .status-destroyed { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
    h3 { margin: 12px 0 8px; font-size: 14px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { border: 1px solid #d1d5db; padding: 6px 8px; text-align: left; }
    th { background: #eef2f7; }
    .error { margin-top: 8px; color: #991b1b; font-weight: 600; }
    .destroyed-badge { color: #b91c1c; font-weight: 800; }
    .tracks { margin-top: 10px; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 6px; padding: 8px; }
    .track-row { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; white-space: pre; margin: 2px 0; }
    .firecons { margin-top: 10px; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 6px; padding: 8px; }
    .firecon-row { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; white-space: pre; margin: 2px 0; }
    .fighters { margin-top: 10px; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 6px; padding: 8px; }
    .fighter-row { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; white-space: pre; margin: 2px 0; }
  </style>
</head>
<body>
  <h1>Generated Fleet Instances</h1>
  <p id="meta" class="meta">Load files from your local <code>generated/</code> folder.</p>

  <div class="controls">
    <button id="select-fleet" class="btn" type="button">Select Fleet</button>
    <button id="rerender" class="btn" type="button">Render Fleet</button>
    <input id="dirPicker" type="file" webkitdirectory directory multiple accept=".json" style="display:none" />
    <span class="hint">Select your <code>generated/</code> folder once, then use Render Fleet to refresh.</span>
  </div>

  <main id="content">
    <p class="meta">No files loaded yet.</p>
  </main>

  <script>
    const metaEl = document.getElementById("meta");
    const contentEl = document.getElementById("content");
    const selectFleetBtn = document.getElementById("select-fleet");
    const dirPicker = document.getElementById("dirPicker");
    const rerenderBtn = document.getElementById("rerender");
    const SHIP_STATUS = Object.freeze({
      DESTROYED: 0,
      OPERATIONAL: 1,
      DAMAGED: 2,
    });

    let currentFiles = [];
    let selectedGeneratedHandle = null;
    const HANDLE_DB_NAME = "ftdamage-fleet-db";
    const HANDLE_STORE_NAME = "handles";
    const HANDLE_KEY = "generated";

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function statusLabel(status) {
      if (status === 0) return "Destroyed";
      if (status === 1) return "Operational";
      if (status === 2) return "Damaged";
      return String(status);
    }

    function countDestroyedBoxes(tracks) {
      if (!Array.isArray(tracks)) return 0;
      let count = 0;
      for (const row of tracks) {
        if (!Array.isArray(row)) continue;
        for (const box of row) {
          if (box === 0) count += 1;
        }
      }
      return count;
    }

    function renderField(label, value) {
      return `<div class="field"><span class="label">${escapeHtml(label)}:</span> <span>${escapeHtml(value)}</span></div>`;
    }

    function renderFieldHtml(label, htmlValue) {
      return `<div class="field"><span class="label">${escapeHtml(label)}:</span> <span>${htmlValue}</span></div>`;
    }

    function isShipInstance(value) {
      return Boolean(value && typeof value === "object" && value.classKey && value.position && value.damage);
    }

    function shipStatusVisual(status) {
      if (status === SHIP_STATUS.OPERATIONAL) {
        return { label: "Undamaged", className: "status-operational" };
      }
      if (status === SHIP_STATUS.DESTROYED) {
        return { label: "Destroyed", className: "status-destroyed" };
      }
      if (status === SHIP_STATUS.DAMAGED) {
        return { label: "Damaged", className: "status-damaged" };
      }
      return { label: String(status), className: "" };
    }

    function driveStatusVisual(status) {
      if (status === SHIP_STATUS.OPERATIONAL) {
        return { label: "Undamaged", className: "status-operational" };
      }
      if (status === SHIP_STATUS.DESTROYED) {
        return { label: "Destroyed", className: "status-destroyed" };
      }
      if (status === SHIP_STATUS.DAMAGED) {
        return { label: "Damaged", className: "status-damaged" };
      }
      return { label: String(status), className: "" };
    }

    function weaponStatusVisual(status) {
      if (status === SHIP_STATUS.OPERATIONAL) {
        return { label: "Undamaged", className: "status-operational" };
      }
      if (status === SHIP_STATUS.DESTROYED) {
        return { label: "Destroyed", className: "status-destroyed" };
      }
      return { label: String(status), className: "" };
    }

    function renderDamageTracks(tracks) {
      if (!Array.isArray(tracks) || !tracks.length) {
        return '<div class="tracks"><div class="track-row">No tracks</div></div>';
      }

      const rows = tracks.map((row, idx) => {
        if (!Array.isArray(row)) {
          return '<div class="track-row">invalid</div>';
        }

        const boxes = row
          .map((cell) => (cell === 0 ? "[x]" : "[ ]"))
          .join(" ");
        return `<div class="track-row">${boxes}</div>`;
      }).join("");

      return `<div class="tracks">${rows}</div>`;
    }

    function renderFirecons(firecons) {
      if (!Array.isArray(firecons) || !firecons.length) {
        return '<div class="firecons"><div class="firecon-row">No firecons</div></div>';
      }

      const rows = firecons.map((fc) => {
        const destroyed = fc && fc.status === 0;
        const symbol = destroyed ? "(x)" : "(●)";
        const label = destroyed ? "Destroyed" : "Undamaged";
        const className = destroyed ? "status-destroyed" : "status-operational";
        return `<div class="firecon-row">${symbol} <span class="status-pill ${className}">${label}</span></div>`;
      }).join("");

      return `<div class="firecons">${rows}</div>`;
    }

    function renderFighters(fighters) {
      if (!Array.isArray(fighters) || !fighters.length) {
        return '<div class="fighters"><div class="fighter-row">None</div></div>';
      }

      const rows = fighters.map((group) => {
        if (!group || typeof group !== "object") {
          return '<div class="fighter-row">invalid</div>';
        }
        const fighterStatus = Number(group.status);
        if (fighterStatus === 2) {
          return '<div class="fighter-row">( ) <span class="status-pill status-damaged">Launched</span></div>';
        }
        if (fighterStatus === 0) {
          return '<div class="fighter-row">(x) <span class="status-pill status-destroyed">Destroyed</span></div>';
        }
        const count = Number.isFinite(group.count) ? group.count : 6;
        return `<div class="fighter-row">(^) ${escapeHtml(count)}</div>`;
      }).join("");

      return `<div class="fighters">${rows}</div>`;
    }

    function renderShipContent(ship) {
      const position = ship.position || {};
      const drive = ship.drive || {};
      const damage = ship.damage || {};
      const firecons = Array.isArray(ship.firecons) ? ship.firecons : [];
      const weapons = Array.isArray(ship.weapons) ? ship.weapons : [];
      const fighters = Array.isArray(ship.fighters) ? ship.fighters : [];
      const shipStatus = shipStatusVisual(ship.status);
      const driveStatus = driveStatusVisual(drive.status);

      const destroyed = Number.isFinite(damage.hits) ? damage.hits : countDestroyedBoxes(damage.tracks);
      const total = Number.isFinite(damage.total) ? damage.total : "?";

      const weaponRows = weapons.length
        ? weapons.map((w, i) => {
            const arcs = Array.isArray(w.arcs) ? w.arcs.join(", ") : "-";
            return [
              "<tr>",
              `  <td>${i + 1}</td>`,
              `  <td>${escapeHtml(w.type || "-")}</td>`,
              `  <td>${escapeHtml(w.class || "-")}</td>`,
              `  <td>${escapeHtml(arcs)}</td>`,
              `  <td><span class="status-pill ${weaponStatusVisual(w.status).className}">${escapeHtml(weaponStatusVisual(w.status).label)}</span></td>`,
              "</tr>"
            ].join("\n");
          }).join("\n")
        : '<tr><td colspan="5">No weapons listed</td></tr>';

      const fightersSection = fighters.length
        ? [
            "  <section>",
            "    <h3>Fighter Groups</h3>",
            `    ${renderFighters(fighters)}`,
            "  </section>"
          ].join("\n")
        : "";

      return [
        "  <section class=\"grid\">",
        renderField("Name", ship.name || "-"),
        renderField("Class", ship.classKey || "-"),
        renderFieldHtml("Ship Status", `<span class="status-pill ${shipStatus.className}">${escapeHtml(shipStatus.label)}</span>`),
        renderField("Position", `x=${position.x ?? "-"}, y=${position.y ?? "-"}`),
        renderField("Heading", ship.heading ?? "-"),
        renderField("Speed", ship.speed ?? "-"),
        renderField("Drive Thrust", drive.thrust ?? "-"),
        renderFieldHtml("Drive Status", `<span class="status-pill ${driveStatus.className}">${escapeHtml(driveStatus.label)}</span>`),
        renderField("Damage", `${destroyed}/${total} boxes destroyed`),
        "  </section>",
        "  <section>",
        "    <h3>Firecon</h3>",
        `    ${renderFirecons(firecons)}`,
        "  </section>",
        "  <section>",
        "    <h3>Damage Tracks</h3>",
        `    ${renderDamageTracks(damage.tracks)}`,
        "  </section>",
        fightersSection,
        "  <section>",
        "    <h3>Weapons</h3>",
        "    <table>",
        "      <thead><tr><th>#</th><th>Type</th><th>Class</th><th>Arcs</th><th>Status</th></tr></thead>",
        `      <tbody>${weaponRows}</tbody>`,
        "    </table>",
        "  </section>"
      ].filter(Boolean).join("\n");
    }

    function renderShipCard(sourcePath, ship) {
      const damage = ship.damage || {};
      const destroyed = Number.isFinite(damage.hits) ? damage.hits : countDestroyedBoxes(damage.tracks);
      const total = Number.isFinite(damage.total) ? damage.total : 0;
      const isDestroyed = Number.isFinite(total) && total > 0 && destroyed >= total;
      const destroyedMark = isDestroyed ? ' <span class="destroyed-badge">DESTROYED</span>' : "";
      return [
        "<details>",
        `  <summary>${escapeHtml(ship.name || "Unnamed Ship")} (${escapeHtml(ship.classKey || "Unknown")})${destroyedMark}</summary>`,
        "  <div class=\"path\">",
        `    Source: ${escapeHtml(sourcePath)}`,
        "  </div>",
        renderShipContent(ship),
        "</details>"
      ].join("\n");
    }

    function buildFleetView(records) {
      const shipsByFleet = new Map();
      const errors = [];
      let shipCount = 0;

      for (const record of records) {
        const rel = String(record && record.relPath ? record.relPath : "");
        const parsed = record ? record.parsed : null;
        if (!rel || !rel.toLowerCase().endsWith(".json")) {
          continue;
        }
        if (!isShipInstance(parsed)) {
          continue;
        }

        const parts = rel.split("/").filter(Boolean);
        const fleetFolder = parts.length >= 2 ? parts[parts.length - 2] : "selected";
        if (!fleetFolder) {
          continue;
        }

        if (!shipsByFleet.has(fleetFolder)) {
          shipsByFleet.set(fleetFolder, []);
        }
        shipsByFleet.get(fleetFolder).push({ source: rel, ship: parsed });
        shipCount += 1;
      }

      const sections = Array.from(shipsByFleet.entries())
        .sort((a, b) => a[0].localeCompare(b[0]))
        .map(([fleetFolder, entries]) => {
          const shipList = entries
            .sort((a, b) => a.source.localeCompare(b.source))
            .map((entry) => renderShipCard(entry.source, entry.ship))
            .join("\n\n");

          return [
            '<section class="fleet-block">',
            `  <h2>Fleet ${escapeHtml(fleetFolder.toUpperCase())} (${entries.length} ships)</h2>`,
            shipList || '  <div class="meta">No ships listed.</div>',
            "</section>"
          ].join("\n");
        });

      return {
        jsonFiles: records.filter((r) => String(r && r.relPath ? r.relPath : "").toLowerCase().endsWith(".json")).length,
        fleetCount: shipsByFleet.size,
        shipCount,
        html: [...sections, ...errors].join("\n\n"),
      };
    }

    async function parseFleetData(files) {
      const records = [];
      const errors = [];

      for (const file of files) {
        const rel = (file.webkitRelativePath || file.name).replace(/\\/g, "/");
        if (!rel.toLowerCase().endsWith(".json")) {
          continue;
        }
        try {
          const text = await file.text();
          records.push({ relPath: rel, parsed: JSON.parse(text) });
        } catch (err) {
          errors.push(`<details><summary>${escapeHtml(rel)}</summary><div class=\"error\">Failed to read or parse JSON: ${escapeHtml(err.message || String(err))}</div></details>`);
        }
      }

      const view = buildFleetView(records);
      if (errors.length) {
        view.html = [view.html, ...errors].filter(Boolean).join("\n\n");
      }
      return view;
    }

    async function resolveGeneratedHandle(handle) {
      if (!handle || handle.kind !== "directory") {
        throw new Error("Invalid directory handle");
      }
      if (String(handle.name || "").toLowerCase() === "generated") {
        return handle;
      }
      try {
        return await handle.getDirectoryHandle("generated");
      } catch (_err) {
        return handle;
      }
    }

    function openHandleDb() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(HANDLE_DB_NAME, 1);
        request.onupgradeneeded = () => {
          const db = request.result;
          if (!db.objectStoreNames.contains(HANDLE_STORE_NAME)) {
            db.createObjectStore(HANDLE_STORE_NAME);
          }
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error || new Error("IndexedDB open failed"));
      });
    }

    async function saveGeneratedHandle(handle) {
      try {
        const db = await openHandleDb();
        await new Promise((resolve, reject) => {
          const tx = db.transaction(HANDLE_STORE_NAME, "readwrite");
          tx.objectStore(HANDLE_STORE_NAME).put(handle, HANDLE_KEY);
          tx.oncomplete = () => resolve();
          tx.onerror = () => reject(tx.error || new Error("IndexedDB write failed"));
        });
        db.close();
      } catch (_err) {
        // Best-effort persistence only.
      }
    }

    async function loadGeneratedHandle() {
      try {
        const db = await openHandleDb();
        const handle = await new Promise((resolve, reject) => {
          const tx = db.transaction(HANDLE_STORE_NAME, "readonly");
          const request = tx.objectStore(HANDLE_STORE_NAME).get(HANDLE_KEY);
          request.onsuccess = () => resolve(request.result || null);
          request.onerror = () => reject(request.error || new Error("IndexedDB read failed"));
        });
        db.close();
        return handle;
      } catch (_err) {
        return null;
      }
    }

    function isJsonFileName(name) {
      return String(name || "").toLowerCase().endsWith(".json");
    }

    async function loadRecordsFromGeneratedHandle(generatedHandle) {
      const records = [];
      const errors = [];

      for await (const [fleetName, fleetEntry] of generatedHandle.entries()) {
        if (!fleetEntry || fleetEntry.kind !== "directory") {
          continue;
        }
        for await (const [fileName, fileEntry] of fleetEntry.entries()) {
          if (!fileEntry || fileEntry.kind !== "file" || !isJsonFileName(fileName)) {
            continue;
          }
          const relPath = `generated/${fleetName}/${fileName}`;
          try {
            const file = await fileEntry.getFile();
            const text = await file.text();
            records.push({ relPath, parsed: JSON.parse(text) });
          } catch (err) {
            errors.push(`<details><summary>${escapeHtml(relPath)}</summary><div class="error">Failed to read or parse JSON: ${escapeHtml(err.message || String(err))}</div></details>`);
          }
        }
      }

      return { records, errors };
    }

    async function renderFromDirectoryHandle() {
      if (!selectedGeneratedHandle) {
        contentEl.innerHTML = '<p class="meta">No files loaded yet.</p>';
        return;
      }
      const { records, errors } = await loadRecordsFromGeneratedHandle(selectedGeneratedHandle);
      const result = buildFleetView(records);
      if (errors.length) {
        result.html = [result.html, ...errors].filter(Boolean).join("\n\n");
      }
      const generatedAt = new Date().toISOString();
      metaEl.textContent = `Generated folder loaded: ${result.jsonFiles} JSON files | Fleet records: ${result.fleetCount} | Ship records shown: ${result.shipCount} | Rendered at: ${generatedAt}`;
      contentEl.innerHTML = result.html || '<p class="meta">No ship instance JSON files found under generated/&lt;fleet&gt;/.json</p>';
    }

    async function renderFromCurrentFiles() {
      if (!currentFiles.length) {
        contentEl.innerHTML = '<p class="meta">No files loaded yet.</p>';
        return;
      }

      const result = await parseFleetData(currentFiles);
      const generatedAt = new Date().toISOString();
      metaEl.textContent = `JSON files loaded: ${result.jsonFiles} | Fleet records: ${result.fleetCount} | Ship records shown: ${result.shipCount} | Rendered at: ${generatedAt}`;
      contentEl.innerHTML = result.html || '<p class="meta">No ship instance JSON files found under generated/&lt;fleet&gt;/.json</p>';
    }

    selectFleetBtn.addEventListener("click", async () => {
      if (!window.showDirectoryPicker) {
        dirPicker.click();
        return;
      }
      try {
        const rememberedHandle = selectedGeneratedHandle || await loadGeneratedHandle();
        const pickerOptions = { mode: "read", id: "ftdamage-fleet-generated" };
        if (rememberedHandle) {
          pickerOptions.startIn = rememberedHandle;
        }
        const selected = await window.showDirectoryPicker(pickerOptions);
        selectedGeneratedHandle = await resolveGeneratedHandle(selected);
        await saveGeneratedHandle(selectedGeneratedHandle);
        currentFiles = [];
        await renderFromDirectoryHandle();
      } catch (err) {
        if (err && err.name === "AbortError") {
          return;
        }
        metaEl.textContent = `Folder selection failed: ${err && err.message ? err.message : String(err)}`;
      }
    });

    dirPicker.addEventListener("change", async (event) => {
      selectedGeneratedHandle = null;
      currentFiles = Array.from(event.target.files || []);
      await renderFromCurrentFiles();
    });

    rerenderBtn.addEventListener("click", async () => {
      if (selectedGeneratedHandle) {
        await renderFromDirectoryHandle();
        return;
      }
      await renderFromCurrentFiles();
    });

    (async () => {
      if (!window.showDirectoryPicker) {
        return;
      }
      const remembered = await loadGeneratedHandle();
      if (!remembered) {
        return;
      }
      const permission = await remembered.queryPermission({ mode: "read" });
      if (permission !== "granted") {
        return;
      }
      selectedGeneratedHandle = await resolveGeneratedHandle(remembered);
    })();
  </script>
</body>
</html>
